<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON TRACK — Adesivo QR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Barlow', sans-serif;
  }

  /* Adesivo 10x10cm a 96dpi = 378x378px
     Per stampa di qualità usiamo 300dpi = 1181x1181px
     Mostriamo a schermo a 378px con @media print a dimensione reale */
  .sticker {
    width: 378px;
    height: 378px;
    background: #0f0f0f;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 20px 18px 16px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }

  /* Alone arancio decorativo */
  .sticker::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,64,12,.35) 0%, transparent 70%);
    pointer-events: none;
  }

  .sticker::after {
    content: '';
    position: absolute;
    bottom: -30px;
    left: -30px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,64,12,.2) 0%, transparent 70%);
    pointer-events: none;
  }

  /* TOP: logo + titolo */
  .top {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    position: relative;
    z-index: 2;
  }

  .top img {
    height: 38px;
    width: auto;
  }

  .top-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .top-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: .1em;
    color: #fff;
  }

  .top-sub {
    font-size: .5rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #e8400c;
    margin-top: 2px;
  }

  /* MIDDLE: claim + QR */
  .middle {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 2;
    flex: 1;
    justify-content: center;
  }

  .claim {
    text-align: center;
    color: #fff;
  }

  .claim-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.55rem;
    line-height: .95;
    letter-spacing: .02em;
  }

  .claim-big em {
    font-style: normal;
    color: #e8400c;
  }

  .claim-small {
    font-size: .6rem;
    font-weight: 300;
    color: #aaa;
    margin-top: 4px;
    line-height: 1.4;
  }

  /* QR */
  .qr-wrap {
    background: #fff;
    padding: 8px;
    border-radius: 8px;
    border: 3px solid #e8400c;
  }

  .qr-wrap img,
  .qr-wrap canvas {
    width: 130px !important;
    height: 130px !important;
    display: block;
  }

  /* BOTTOM: istruzioni */
  .bottom {
    width: 100%;
    position: relative;
    z-index: 2;
  }

  .istruzioni {
    display: flex;
    justify-content: center;
    gap: 14px;
  }

  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    text-align: center;
  }

  .step-icon {
    font-size: .95rem;
    line-height: 1;
  }

  .step-testo {
    font-size: .45rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #777;
    line-height: 1.3;
    max-width: 60px;
  }

  .step-sep {
    color: #333;
    font-size: .8rem;
    align-self: center;
    margin-top: -8px;
  }

  /* Linea separatrice */
  .divider {
    width: 100%;
    height: 1px;
    background: #222;
    margin-bottom: 10px;
  }

  /* PRINT */
  @media print {
    body {
      background: white;
      margin: 0;
    }
    .sticker {
      width: 10cm;
      height: 10cm;
      border-radius: 0;
      box-shadow: none;
      padding: 0.5cm 0.45cm 0.4cm;
    }
    .no-print { display: none; }
  }
</style>
</head>
